name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Code Quality & Linting
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: lint-${{ runner.os }}-pip-

      - name: Install linting tools
        run: pip install ruff black

      - name: Run Ruff (linter)
        run: ruff check src/ tests/ --output-format=github

      - name: Run Black (format check)
        run: black --check --diff src/ tests/

  # ─────────────────────────────────────────────
  # JOB 2: SQL Linting
  # ─────────────────────────────────────────────
  sql-lint:
    name: 🗄️ SQL Lint (SQLFluff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install SQLFluff
        run: pip install sqlfluff sqlfluff-templater-dbt dbt-duckdb

      - name: Run SQLFluff lint
        run: sqlfluff lint nhs_dbt/models/ --dialect duckdb --templater dbt
        continue-on-error: false

  # ─────────────────────────────────────────────
  # JOB 3: Unit & Integration Tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Pytest Suite
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Download spaCy model
        run: poetry run python -m spacy download en_core_web_sm

      - name: Set up test environment variables
        run: |
          cp .env.example .env
          echo "DUCKDB_PATH=:memory:" >> .env
          echo "ENVIRONMENT=test" >> .env

      - name: Run pytest with coverage
        run: |
          poetry run pytest tests/ \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 4: dbt Compile & Test
  # ─────────────────────────────────────────────
  dbt:
    name: 📦 dbt Compile & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-3.11-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Create dbt profiles for CI (DuckDB in-memory)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'PROFILES'
          nhs_dbt:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: ":memory:"
                threads: 4
          PROFILES

      - name: Generate synthetic seed data for dbt
        run: |
          poetry run python scripts/generate_ci_seeds.py || echo "No CI seed script found, skipping."

      - name: dbt deps
        working-directory: nhs_dbt
        run: poetry run dbt deps

      - name: dbt compile
        working-directory: nhs_dbt
        run: poetry run dbt compile --profiles-dir ~/.dbt --target ci

      - name: dbt run (staging models)
        working-directory: nhs_dbt
        run: poetry run dbt run --select staging --profiles-dir ~/.dbt --target ci

      - name: dbt test
        working-directory: nhs_dbt
        run: poetry run dbt test --profiles-dir ~/.dbt --target ci

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dbt-artifacts
          path: nhs_dbt/target/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 5: FastAPI Health Check
  # ─────────────────────────────────────────────
  api-check:
    name: 🌐 FastAPI Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.11-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-3.11-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Set up environment
        run: |
          cp .env.example .env
          echo "DUCKDB_PATH=:memory:" >> .env
          echo "ENVIRONMENT=test" >> .env

      - name: Run FastAPI import & schema check
        run: |
          poetry run python -c "
          from src.api.main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          resp = client.get('/health')
          assert resp.status_code == 200, f'Health check failed: {resp.status_code}'
          print('✅ FastAPI health check passed')
          resp2 = client.get('/openapi.json')
          assert resp2.status_code == 200
          print('✅ OpenAPI schema generated successfully')
          "

  # ─────────────────────────────────────────────
  # JOB 6: Docker Build Validation
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [test, dbt]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pipeline image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: nhs-data-pipeline:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: nhs-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 7: Pre-commit Hooks
  # ─────────────────────────────────────────────
  pre-commit:
    name: 🪝 Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  # ─────────────────────────────────────────────
  # JOB 8: CI Summary (Gate)
  # ─────────────────────────────────────────────
  ci-success:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    needs: [lint, sql-lint, test, dbt, api-check, docker-build, pre-commit]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.dbt.result }}" != "success" || \
                "${{ needs.api-check.result }}" != "success" || \
                "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "❌ One or more required CI jobs failed."
            exit 1
          fi
          echo "✅ All CI jobs passed. Pipeline is green."
