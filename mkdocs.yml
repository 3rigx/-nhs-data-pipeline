site_name: NHS Data Pipeline
site_description: End-to-end NHS data engineering platform — ELT pipelines, OMOP CDM, Clinical NLP, and Research Cohort Generation
site_author: Greendly Guosadia
site_url: https://3rigx.github.io/-nhs-data-pipeline
repo_name: 3rigx/-nhs-data-pipeline
repo_url: https://github.com/3rigx/-nhs-data-pipeline
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.path
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Data Dictionary: data-dictionary.md
  - API Reference: api-reference.md
  - Cohort Builder: cohort-builder.md
  - NLP Pipeline: nlp-pipeline.md
  - Development Guide: development-guide.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/3rigx
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/greendly-guosadia

copyright: >
  &copy; 2026 Greendly Guosadia. Released under the MIT License.
