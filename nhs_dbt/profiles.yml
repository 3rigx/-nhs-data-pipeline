# ============================================
# dbt Profiles - Dual Environment Setup
# ============================================
nhs_data_pipeline:
  target: dev

  outputs:
    # Local Development (DuckDB)
    dev:
      type: duckdb
      path: "../data/duckdb/nhs_pipeline.duckdb"
      threads: 4

    # Production (Snowflake)
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'NHS_PIPELINE_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'NHS_DATA_PLATFORM') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'DBT_ROLE') }}"
      schema: raw
      threads: 4